name: Run tests
on: push

jobs:
    run_tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.13'

            - name: Install dependencies
              run: |
                pip install selenium requests pytest
                pip install -r requirements_py312.txt

            - name: Run Selenium tests
              run: |
                pytest tests/
